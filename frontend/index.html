<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MasarratCare — Product System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>MasarratCare — Product Authenticity & Shade Finder</h1>

<!--  PRODUCTS SECTION  -->

<section>
    <h2>Products</h2>

    <div>
        <h3>Add New Product</h3>
        <input type="text"   id="p-name"        placeholder="Product Name">
        <input type="text"   id="p-category"    placeholder="Category (lips/eyes/skin)">
        <input type="number" id="p-price"       placeholder="Price (Rs.)">
        <input type="text"   id="p-description" placeholder="Description">
        <button onclick="addProduct()">Add Product</button>
    </div>

    <div>
        <h3>All Products</h3>
        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="product-list">
            </tbody>
        </table>
    </div>
</section>

<hr>

<!--  SHADES SECTION  -->
  
<section>
    <h2>Shade Finder</h2>

    <div>
        <h3>Add Shade</h3>
        <input type="number" id="s-product-id" placeholder="Product ID">
        <input type="text"   id="s-name"       placeholder="Shade Name (e.g. Rose Pink)">
        <input type="text"   id="s-hex"        placeholder="Hex Code (e.g. #FF69B4)">
        <button onclick="addShade()">Add Shade</button>
    </div>

    <div>
        <h3>Find Shades for Product</h3>
        <input type="number" id="s-search-id" placeholder="Enter Product ID">
        <button onclick="loadShades()">Find Shades</button>
        <div id="shade-list"></div>
    </div>
</section>

<hr>

<script src="app.js"></script>
</body>
</html>
